image: archlinux
packages:
  - go
  - podman
sources:
  - https://github.com/go-ap/fedbox
secrets:
- 3dcea276-38d6-4a7e-85e5-20cbc903e1ea
tasks:
  - setup: |
      test ${BUILD_SUBMITTER} != "git.sr.ht" && complete-build
      cd fedbox && make download
  - build: |
      cd fedbox
      make STORAGE=fs clean all
      make STORAGE=boltdb clean all
      make STORAGE=sqlite clean all
      make STORAGE=all clean all
  - tests: |
      cd fedbox
      make test
  - coverage: |
      set -a +x
      cd fedbox
      make coverage
  - integration-new-setup: |
      systemctl --user start podman.socket
      cd fedbox
      make -C integration download
      # try to cache some steps of the the build so real tests don't need so long of a timeout
      go test -timeout 120s -tags s2s,c2s,ssh -c -o /tmp/integration.test ./ || true
  - integration-new-fs: |
      cd fedbox
      make STORAGE=fs -C integration test
  - integration-new-badger: |
      cd fedbox
      make STORAGE=badger -C integration test
  - integration-new-boltdb: |
      cd fedbox
      make STORAGE=boltdb -C integration test
  - integration-new-sqlite: |
      cd fedbox
      make STORAGE=sqlite -C integration test
  - push_to_github: |
      test ${BUILD_SUBMITTER} != "git.sr.ht" && complete-build
      set -a +x
      ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      cd fedbox
      git remote add hub git@github.com:go-ap/fedbox
      git push hub --force --all
  - integration-fs: |
      cd fedbox
      ./tools/run-tests.sh fs
  - integration-boltdb: |
      cd fedbox
      #./tools/run-tests.sh boltdb
  - integration-sqlite: |
      cd fedbox
      ./tools/run-tests.sh sqlite
  - integration-badger: |
      cd fedbox
      ./tools/run-tests.sh badger
